<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wordly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#161821; --panel:#1f222e; --panel2:#272b3a;
    --paper:#f7f2e7; --paperline:#d9cfba; --ink:#2b2a26; --inksoft:#6e6a5e;
    --red:#c9543f; --amber:#f0b35c; --green:#7fb069; --blue:#5d9bc7; --brown:#b08653;
    --text:#e9e7df; --dim:#9a99a6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,sans-serif; max-width:460px; margin:0 auto;
    min-height:100vh; display:flex; flex-direction:column;}
  h1,h2{font-family:Georgia,serif; font-weight:400}
  button{font-family:inherit; cursor:pointer}
  .screen{flex:1; display:none; flex-direction:column; padding:20px}
  .screen.active{display:flex}

  /* бумажная карточка */
  .paper{position:relative; background:var(--paper); border-radius:10px;
    box-shadow:0 6px 18px rgba(0,0,0,.45);
    background-image:repeating-linear-gradient(transparent,transparent 27px,var(--paperline) 27px,var(--paperline) 28px);}
  .paper::before{content:""; position:absolute; top:0; bottom:0; left:34px; width:1.5px; background:rgba(201,84,63,.45)}

  /* главная */
  .header{display:flex; justify-content:space-between; align-items:baseline}
  .streak{font-size:15px; color:var(--amber)}
  .goalbox{margin-top:18px; background:var(--panel); border-radius:14px; padding:14px 16px}
  .goalrow{display:flex; justify-content:space-between; font-size:13px; color:var(--dim); margin-bottom:8px}
  .bar{height:8px; background:var(--panel2); border-radius:4px; overflow:hidden}
  .bar>div{height:100%; background:var(--amber); transition:width .4s}
  .deck{margin-top:26px; position:relative; height:200px; cursor:pointer}
  .deck .paper{position:absolute; inset:0}
  .deck .back1{transform:rotate(3deg) translateY(8px); opacity:.5}
  .deck .back2{transform:rotate(-2deg) translateY(4px); opacity:.75}
  .deck .top{display:flex; flex-direction:column; align-items:center; justify-content:center}
  .deck .title{font-family:Georgia,serif; font-size:26px; color:var(--ink)}
  .deck .sub{margin-top:8px; font-size:14px; color:var(--inksoft)}
  .deck .go{margin-top:14px; background:var(--red); color:#fff; padding:8px 26px; border-radius:999px; font-size:15px; font-weight:600}
  .quizbtn{margin-top:22px; width:100%; background:var(--panel); border:1px solid var(--panel2);
    color:var(--text); padding:14px; border-radius:14px; font-size:15px}
  .stats{display:flex; gap:10px; margin-top:22px; font-size:13px; color:var(--dim)}
  .stats>div{flex:1; background:var(--panel); border-radius:12px; padding:10px 0; text-align:center}
  .stats b{display:block; font-size:20px; color:var(--text)}

  /* учёба */
  .topbar{display:flex; align-items:center; gap:12px}
  .x{background:none; border:none; color:var(--dim); font-size:22px}
  .cardwrap{height:min(420px, 56vh); margin:26px 0 20px; perspective:1100px; cursor:pointer}
  .flipper{position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .45s}
  .flipper.flipped{transform:rotateY(180deg)}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 28px}
  .face.backface{transform:rotateY(180deg)}
  .flipper:not(.flipped) .face.backface{visibility:hidden}
  .flipper.flipped .face:not(.backface){visibility:hidden}
  .flipper .face{transition:visibility 0s .2s}
  .word{font-family:Georgia,serif; font-size:40px; color:var(--ink); text-align:center}
  .trans{margin-top:6px; color:var(--inksoft); font-size:17px}
  .newtag{position:absolute; top:12px; right:14px; font-size:11px; background:var(--amber); color:var(--ink); padding:2px 10px; border-radius:999px; font-weight:700}
  .speak{margin-top:16px; background:none; border:1.5px solid var(--inksoft); border-radius:999px; padding:6px 18px; font-size:18px; color:var(--ink)}
  .hint{position:absolute; bottom:14px; font-size:12px; color:var(--inksoft)}
  .translation{font-family:Georgia,serif; font-size:30px; color:var(--ink); text-align:center}
  .example{margin-top:16px; font-style:italic; color:var(--inksoft); font-size:15px; text-align:center; line-height:1.5}
  .grades{display:flex; gap:8px}
  .grades button{flex:1; background:var(--panel); border-radius:12px; padding:12px 0; font-size:14px; font-weight:600}
  .g0{border:1.5px solid var(--red); color:var(--red)}
  .g1{border:1.5px solid var(--brown); color:var(--brown)}
  .g2{border:1.5px solid var(--green); color:var(--green)}
  .g3{border:1.5px solid var(--blue); color:var(--blue)}
  .primary{background:var(--red); color:#fff; border:none; border-radius:12px; padding:14px 30px; font-size:15px; font-weight:600; width:100%}

  /* тест */
  .opt{display:block; width:100%; background:var(--panel); border:1.5px solid var(--panel2); color:var(--text);
    border-radius:12px; padding:14px; font-size:15px; margin-bottom:10px; text-align:left}
  .opt.right{border-color:var(--green)} .opt.wrong{border-color:var(--red)}

  /* слова / добавление */
  input,textarea{width:100%; background:var(--panel); border:1px solid var(--panel2); color:var(--text);
    border-radius:12px; padding:13px 14px; font-size:15px; outline:none; margin-top:10px}
  .wrow{background:var(--panel); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px}
  .wrow .w{font-family:Georgia,serif; font-size:17px}
  .wrow .t{color:var(--dim); font-size:14px}
  .wrow .s{font-size:11px; margin-top:2px; color:var(--dim)}
  .del{background:none; border:none; color:var(--dim); font-size:16px}
  .err{color:var(--red); font-size:13px; margin-top:8px}

  /* финал сессии */
  .center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center}
  .big{font-size:52px}

  /* навигация */
  nav{position:sticky; bottom:0; display:flex; background:var(--panel); border-top:1px solid var(--panel2); margin-top:auto}
  nav button{flex:1; padding:10px 0 14px; background:none; border:none; color:var(--dim); font-size:12px}
  nav button.on{color:var(--amber)}
  nav .ic{font-size:22px}
</style>
</head>
<body>

<!-- ГЛАВНАЯ -->
<div class="screen active" id="scr-home">
  <div class="header"><h1 style="margin:0;font-size:30px">Wordly</h1><div class="streak" id="streak">🔥 0</div></div>
  <div class="goalbox">
    <div class="goalrow"><span>Цель на сегодня</span><span id="goaltext">0 / 50 XP</span></div>
    <div class="bar"><div id="goalbar" style="width:0%"></div></div>
  </div>
  <div class="deck" onclick="startStudy()">
    <div class="paper back1"></div><div class="paper back2"></div>
    <div class="paper top">
      <div class="title">Учить карточки</div>
      <div class="sub" id="duecount"></div>
      <div class="go">Начать →</div>
    </div>
  </div>
  <button class="quizbtn" onclick="startQuiz()">🎯 Тест: выбери перевод</button>
  <div class="stats">
    <div><b id="st-total">0</b>всего слов</div>
    <div><b id="st-learned">0</b>выучено</div>
    <div><b id="st-xp">0</b>всего XP</div>
  </div>
</div>

<!-- УЧЁБА -->
<div class="screen" id="scr-study">
  <div class="topbar">
    <button class="x" onclick="show('home')">✕</button>
    <div class="bar" style="flex:1"><div id="studybar" style="width:0%"></div></div>
    <span style="font-size:13px;color:var(--dim)" id="studyleft"></span>
  </div>
  <div class="cardwrap" onclick="flip()">
    <div class="flipper" id="flipper">
      <div class="face paper" id="faceFront"></div>
      <div class="face paper backface" id="faceBack"></div>
    </div>
  </div>
  <div id="studyControls"></div>
</div>

<!-- ФИНАЛ СЕССИИ -->
<div class="screen" id="scr-done">
  <div class="center">
    <div class="big">🎉</div>
    <h2>Сессия закончена!</h2>
    <div style="color:var(--dim);font-size:14px" id="doneinfo"></div>
    <button class="primary" style="margin-top:22px;width:auto" onclick="sendToBot()" id="botbtn">📤 Сохранить стрик в боте</button>
    <button class="quizbtn" onclick="show('home')">На главную</button>
  </div>
</div>

<!-- ТЕСТ -->
<div class="screen" id="scr-quiz">
  <div class="topbar">
    <button class="x" onclick="show('home')">✕</button>
    <span style="margin-left:auto;font-size:14px;color:var(--dim)" id="quizinfo"></span>
  </div>
  <div class="center" id="quizbody"></div>
</div>

<!-- СЛОВА -->
<div class="screen" id="scr-words">
  <h2 style="margin-top:0" id="wordstitle">Мои слова</h2>
  <input id="search" placeholder="Поиск…" oninput="renderWords()">
  <div id="wordlist" style="margin-top:14px"></div>
</div>

<!-- ДОБАВИТЬ -->
<div class="screen" id="scr-add">
  <h2 style="margin-top:0">Новое слово</h2>
  <input id="f-word" placeholder="Слово (англ.)">
  <input id="f-trans" placeholder="Транскрипция [...] — необязательно">
  <input id="f-translation" placeholder="Перевод">
  <textarea id="f-example" placeholder="Пример предложения — необязательно" rows="2" style="resize:none"></textarea>
  <div class="err" id="adderr"></div>
  <button class="primary" style="margin-top:22px" onclick="saveWord()">Сохранить в колоду</button>
</div>

<nav>
  <button id="nav-home" class="on" onclick="show('home')"><div class="ic">🃏</div>Учёба</button>
  <button id="nav-words" onclick="show('words')"><div class="ic">📚</div>Слова</button>
  <button id="nav-add" onclick="show('add')"><div class="ic">＋</div>Добавить</button>
</nav>

<script>
/* ================= Telegram ================= */
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const haptic = (t) => { try { tg && tg.HapticFeedback.impactOccurred(t || "light"); } catch(e){} };

/* ================= Хранилище: CloudStorage → localStorage → память ================= */
const memFallback = {};
const store = {
  async get(key){
    if (tg && tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast("6.9")) {
      return new Promise(res => tg.CloudStorage.getItem(key, (e,v) => res(e ? null : (v || null))));
    }
    try { return localStorage.getItem(key); } catch(e){ return memFallback[key] || null; }
  },
  async set(key, val){
    if (tg && tg.CloudStorage && tg.isVersionAtLeast && tg.isVersionAtLeast("6.9")) {
      return new Promise(res => tg.CloudStorage.setItem(key, val, () => res()));
    }
    try { localStorage.setItem(key, val); } catch(e){ memFallback[key] = val; }
  }
};

/* CloudStorage: лимит 4КБ на ключ → слова храним чанками по 12 */
const CHUNK = 12;
async function saveAll(){
  const chunks = [];
  for (let i = 0; i < S.words.length; i += CHUNK) chunks.push(S.words.slice(i, i + CHUNK));
  await store.set("meta", JSON.stringify({ chunks: chunks.length, stats: S.stats }));
  for (let i = 0; i < chunks.length; i++) await store.set("w" + i, JSON.stringify(chunks[i]));
}
let saveTimer = null;
const persist = () => { clearTimeout(saveTimer); saveTimer = setTimeout(saveAll, 500); };

async function loadAll(){
  const metaRaw = await store.get("meta");
  if (!metaRaw) return null;
  try {
    const meta = JSON.parse(metaRaw);
    let words = [];
    for (let i = 0; i < meta.chunks; i++) {
      const c = await store.get("w" + i);
      if (c) words = words.concat(JSON.parse(c));
    }
    return { words, stats: meta.stats };
  } catch(e){ return null; }
}

/* ================= SRS (упрощённый SM-2) ================= */
const DAY = 86400000;
function gradeCard(c, g){
  let { interval = 0, ease = 2.5, reps = 0 } = c;
  if (g === 0) return Object.assign({}, c, { interval:0, reps:0, ease:Math.max(1.3, ease-0.2), due:Date.now()+600000, isNew:false });
  if (reps === 0) interval = g === 3 ? 3 : 1;
  else if (g === 1) interval = Math.max(1, Math.round(interval*1.2));
  else if (g === 2) interval = Math.round(interval*ease);
  else interval = Math.round(interval*ease*1.3);
  ease = Math.max(1.3, ease + (g===3 ? .15 : g===1 ? -.15 : 0));
  return Object.assign({}, c, { interval, ease, reps:reps+1, due:Date.now()+interval*DAY, isNew:false });
}

/* ================= Стартовая колода ================= */
const STARTER = [
["consider","[kənˈsɪdər]","рассматривать, считать","Consider all your options before deciding."],
["achieve","[əˈtʃiːv]","достигать","She achieved her goal in two years."],
["although","[ɔːlˈðəʊ]","хотя","Although it was raining, we went out."],
["available","[əˈveɪləbl]","доступный","Tickets are still available online."],
["confident","[ˈkɒnfɪdənt]","уверенный","Be confident at the interview."],
["decrease","[dɪˈkriːs]","уменьшаться","Prices decreased last month."],
["entire","[ɪnˈtaɪər]","целый, весь","I spent the entire day reading."],
["familiar","[fəˈmɪliər]","знакомый","His face looks familiar to me."],
["gather","[ˈɡæðər]","собирать(ся)","People gathered in the square."],
["however","[haʊˈevər]","однако","It's cheap. However, the quality is poor."],
["improve","[ɪmˈpruːv]","улучшать","Practice improves your skills."],
["judge","[dʒʌdʒ]","судить; судья","Don't judge a book by its cover."],
["knowledge","[ˈnɒlɪdʒ]","знание","Knowledge is power."],
["lack","[læk]","недостаток, нехватка","The project failed for lack of money."],
["mention","[ˈmenʃn]","упоминать","He didn't mention the price."],
["notice","[ˈnəʊtɪs]","замечать","I noticed a mistake in the text."],
["obvious","[ˈɒbviəs]","очевидный","The answer is obvious."],
["provide","[prəˈvaɪd]","предоставлять","The hotel provides free breakfast."],
["require","[rɪˈkwaɪər]","требовать","This job requires experience."],
["suggest","[səˈdʒest]","предлагать","I suggest taking a break."],
["tiny","[ˈtaɪni]","крошечный","A tiny bird sat on the branch."],
["urgent","[ˈɜːdʒənt]","срочный","I have an urgent message for you."],
["valuable","[ˈvæljuəbl]","ценный","Time is the most valuable thing."],
["wonder","[ˈwʌndər]","интересоваться; чудо","I wonder what happened."],
["approve","[əˈpruːv]","одобрять","My parents approved my choice."],
["borrow","[ˈbɒrəʊ]","одалживать (брать)","Can I borrow your pen?"],
["create","[kriˈeɪt]","создавать","He created a new app."],
["develop","[dɪˈveləp]","развивать","Reading develops imagination."],
["explain","[ɪkˈspleɪn]","объяснять","Let me explain the rules."],
["fail","[feɪl]","терпеть неудачу","He failed the exam twice."]
];

const NEW_PER_SESSION = 7, GOAL = 50;
const today = () => new Date().toDateString();
let S = null;

/* ================= Инициализация ================= */
(async function init(){
  let data = await loadAll();
  if (!data) {
    data = {
      words: STARTER.map((a,i)=>({ id:"s"+i, word:a[0], trans:a[1], translation:a[2], example:a[3], interval:0, ease:2.5, reps:0, due:0, isNew:true })),
      stats: { xp:0, xpToday:0, xpDate:today(), streak:0, lastDay:"" }
    };
  }
  if (data.stats.xpDate !== today()) { data.stats.xpToday = 0; data.stats.xpDate = today(); }
  if (data.stats.lastDay && data.stats.lastDay !== today()) {
    const diff = (new Date(today()) - new Date(data.stats.lastDay)) / DAY;
    if (diff > 1) data.stats.streak = 0;
  }
  S = data;
  renderHome();
})();

/* ================= Общие ================= */
function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("scr-"+id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("on"));
  const nb = document.getElementById("nav-"+id); if (nb) nb.classList.add("on");
  if (id === "home") renderHome();
  if (id === "words") renderWords();
}
function plural(n,a,b,c){ const m=n%10, h=n%100; if(m===1&&h!==11)return a; if(m>=2&&m<=4&&(h<12||h>14))return b; return c; }
function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.lang="en-US"; u.rate=.9; speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function esc(s){ const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function addXp(n){
  S.stats.xp += n; S.stats.xpToday += n;
  if (S.stats.lastDay !== today()) {
    const diff = S.stats.lastDay ? (new Date(today()) - new Date(S.stats.lastDay)) / DAY : 99;
    S.stats.streak = diff === 1 ? S.stats.streak + 1 : 1;
    S.stats.lastDay = today();
  }
}

/* ================= Главная ================= */
function renderHome(){
  if (!S) return;
  const due = S.words.filter(w => !w.isNew && w.due <= Date.now()).length;
  const fresh = S.words.filter(w => w.isNew).length;
  document.getElementById("streak").textContent = "🔥 " + S.stats.streak + " " + plural(S.stats.streak,"день","дня","дней");
  document.getElementById("goaltext").textContent = S.stats.xpToday + " / " + GOAL + " XP";
  const pct = Math.min(100, Math.round(S.stats.xpToday / GOAL * 100));
  const bar = document.getElementById("goalbar");
  bar.style.width = pct + "%"; bar.style.background = pct >= 100 ? "var(--green)" : "var(--amber)";
  document.getElementById("duecount").textContent =
    (due > 0 ? due + " на повторение" : "повторений нет") + " · " + Math.min(NEW_PER_SESSION, fresh) + " новых";
  document.getElementById("st-total").textContent = S.words.length;
  document.getElementById("st-learned").textContent = S.words.filter(w => w.reps >= 3).length;
  document.getElementById("st-xp").textContent = S.stats.xp;
}

/* ================= Учёба ================= */
let queue = [], qTotal = 0, qDone = 0, flippedNow = false, sessionXp = 0;

function startStudy(){
  const due = S.words.filter(w => !w.isNew && w.due <= Date.now());
  const fresh = S.words.filter(w => w.isNew).slice(0, NEW_PER_SESSION);
  queue = shuffle([...due, ...fresh]).map(w => w.id);
  qTotal = queue.length; qDone = 0; sessionXp = 0;
  if (qTotal === 0) { alert("Пока нечего учить — добавь слова или зайди позже 😴"); return; }
  show("study"); renderCard();
}
function renderCard(){
  if (queue.length === 0) { finishSession(); return; }
  const c = S.words.find(w => w.id === queue[0]);
  flippedNow = false;
  document.getElementById("flipper").classList.remove("flipped");
  document.getElementById("faceFront").innerHTML =
    (c.isNew ? '<div class="newtag">НОВОЕ</div>' : '') +
    '<div class="word">' + esc(c.word) + '</div>' +
    (c.trans ? '<div class="trans">' + esc(c.trans) + '</div>' : '') +
    '<button class="speak" onclick="event.stopPropagation();speak(\'' + esc(c.word).replace(/'/g,"\\'") + '\')">🔊</button>' +
    '<div class="hint">нажми, чтобы перевернуть</div>';
  document.getElementById("faceBack").innerHTML =
    '<div class="translation">' + esc(c.translation) + '</div>' +
    (c.example ? '<div class="example">“' + esc(c.example) + '”</div>' : '') +
    '<div style="margin-top:14px;font-size:13px;color:var(--inksoft)">' + esc(c.word) + ' ' + esc(c.trans || '') + '</div>';
  document.getElementById("studybar").style.width = Math.round(qDone / qTotal * 100) + "%";
  document.getElementById("studyleft").textContent = queue.length;
  document.getElementById("studyControls").innerHTML =
    '<button class="primary" onclick="flip()">Показать ответ</button>';
}
function flip(){
  if (flippedNow) { document.getElementById("flipper").classList.toggle("flipped"); return; }
  flippedNow = true; haptic("light");
  document.getElementById("flipper").classList.add("flipped");
  document.getElementById("studyControls").innerHTML =
    '<div class="grades">' +
    '<button class="g0" onclick="grade(0)">Снова<div style="font-size:10px;font-weight:400;opacity:.7">&lt;10м</div></button>' +
    '<button class="g1" onclick="grade(1)">Трудно</button>' +
    '<button class="g2" onclick="grade(2)">Хорошо</button>' +
    '<button class="g3" onclick="grade(3)">Легко</button></div>';
}
function grade(g){
  haptic(g === 0 ? "heavy" : "light");
  const id = queue[0];
  const idx = S.words.findIndex(w => w.id === id);
  S.words[idx] = gradeCard(S.words[idx], g);
  const xp = [0,5,10,15][g];
  if (xp) { addXp(xp); sessionXp += xp; qDone++; queue.shift(); }
  else queue = [...queue.slice(1), id];
  persist();
  renderCard();
}
function finishSession(){
  show("done");
  document.getElementById("doneinfo").textContent =
    "Карточек: " + qDone + " · +" + sessionXp + " XP · 🔥 стрик " + S.stats.streak;
  document.getElementById("botbtn").style.display = (tg && tg.initDataUnsafe && tg.initDataUnsafe.query_id === undefined) ? "block" : "block";
}
function sendToBot(){
  if (!tg) { alert("Работает только внутри Телеграма"); return; }
  try {
    tg.sendData(JSON.stringify({ type:"session", streak:S.stats.streak, xp:S.stats.xpToday, date:today() }));
  } catch(e){ alert("Открой приложение через кнопку «📚 Открыть Wordly» в боте, тогда стрик сохранится."); }
}

/* ================= Тест ================= */
let quizNum = 0, quizScore = 0; const QUIZ_TOTAL = 10;
function startQuiz(){
  if (S.words.length < 4) { alert("Нужно минимум 4 слова."); return; }
  quizNum = 0; quizScore = 0; show("quiz"); nextQuiz();
}
function nextQuiz(){
  quizNum++;
  if (quizNum > QUIZ_TOTAL) {
    document.getElementById("quizinfo").textContent = "";
    document.getElementById("quizbody").innerHTML =
      '<div class="big">' + (quizScore >= 8 ? "🏆" : quizScore >= 5 ? "👍" : "📖") + '</div>' +
      '<h2>' + quizScore + ' из ' + QUIZ_TOTAL + '</h2>' +
      '<div style="color:var(--amber)">+' + quizScore * 5 + ' XP</div>' +
      '<button class="primary" style="margin-top:22px;width:auto" onclick="show(\'home\')">На главную</button>';
    return;
  }
  const pool = shuffle([...S.words]);
  const ans = pool[0];
  const opts = shuffle([ans.translation, ...pool.slice(1,4).map(w => w.translation)]);
  document.getElementById("quizinfo").textContent = quizNum + " / " + QUIZ_TOTAL + " · верно: " + quizScore;
  document.getElementById("quizbody").innerHTML =
    '<div style="text-align:center;margin-bottom:30px"><div style="font-family:Georgia,serif;font-size:36px">' + esc(ans.word) + '</div>' +
    '<button class="speak" style="border-color:var(--dim);color:var(--text)" onclick="speak(\'' + esc(ans.word).replace(/'/g,"\\'") + '\')">🔊</button></div>' +
    '<div style="width:100%">' + opts.map(o =>
      '<button class="opt" data-t="' + esc(o) + '" onclick="pickOpt(this,\'' + esc(ans.translation).replace(/'/g,"\\'") + '\')">' + esc(o) + '</button>'
    ).join("") + '</div>';
}
function pickOpt(btn, correct){
  document.querySelectorAll(".opt").forEach(b => b.onclick = null);
  const ok = btn.dataset.t === correct;
  if (ok) { btn.classList.add("right"); quizScore++; addXp(5); persist(); haptic("light"); }
  else {
    btn.classList.add("wrong"); haptic("heavy");
    document.querySelectorAll(".opt").forEach(b => { if (b.dataset.t === correct) b.classList.add("right"); });
  }
  setTimeout(nextQuiz, 900);
}

/* ================= Слова ================= */
function renderWords(){
  document.getElementById("wordstitle").textContent = "Мои слова · " + S.words.length;
  const q = (document.getElementById("search").value || "").toLowerCase();
  const list = S.words.filter(w => (w.word + w.translation).toLowerCase().includes(q));
  document.getElementById("wordlist").innerHTML = list.map(w => {
    const status = w.isNew ? '<span style="color:var(--amber)">новое</span>'
      : w.reps >= 3 ? '<span style="color:var(--green)">выучено</span>'
      : 'повтор через ' + Math.max(0, Math.ceil((w.due - Date.now()) / DAY)) + ' дн.';
    return '<div class="wrow"><div style="flex:1"><span class="w">' + esc(w.word) + '</span>' +
      '<span class="t"> — ' + esc(w.translation) + '</span><div class="s">' + status + '</div></div>' +
      '<button class="del" onclick="delWord(\'' + w.id + '\')">🗑</button></div>';
  }).join("") || '<div style="color:var(--dim);text-align:center;margin-top:30px">Ничего не найдено</div>';
}
function delWord(id){ S.words = S.words.filter(w => w.id !== id); persist(); renderWords(); }

/* ================= Добавление ================= */
function saveWord(){
  const word = document.getElementById("f-word").value.trim();
  const translation = document.getElementById("f-translation").value.trim();
  if (!word || !translation) { document.getElementById("adderr").textContent = "Нужны слово и перевод"; return; }
  S.words.unshift({
    id: "u" + Date.now(), word,
    trans: document.getElementById("f-trans").value.trim(),
    translation,
    example: document.getElementById("f-example").value.trim(),
    interval: 0, ease: 2.5, reps: 0, due: 0, isNew: true
  });
  persist();
  ["f-word","f-trans","f-translation","f-example"].forEach(i => document.getElementById(i).value = "");
  document.getElementById("adderr").textContent = "";
  haptic("light");
  show("words");
}
</script>
